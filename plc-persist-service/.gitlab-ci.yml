
variables:
  PERSIST_IMAGE_NAME: harbor.cluster.lab/industrial/plc-persist-service
  PERSIST_IMAGE_TAG: $CI_COMMIT_SHORT_SHA
  PERSIST_INFRA_BRANCH: "main"
  PERSIST_INFRA_APP_PATH: "api/plc-persist-service/overlays/dev"

stages:
  - build
  - docker
  - update-infra

persist-build:
  stage: build
  image: maven:3.9.9-eclipse-temurin-21
  script:
    - mvn -B -DskipTests -pl plc-persist-service -am clean package
  artifacts:
    paths:
      - plc-persist-service/target/*.jar
    expire_in: 1 day

persist-docker-build:
  stage: docker
  image: docker:27
  services:
    - name: docker:27-dind
      command: ["--dns=10.10.100.1", "--insecure-registry=harbor.cluster.lab"]
  variables:
    DOCKER_TLS_CERTDIR: ""
  script:
    - cd plc-persist-service
    - getent hosts harbor.cluster.lab
    - echo "$HARBOR_PASSWORD" | docker login harbor.cluster.lab -u "$HARBOR_USERNAME" --password-stdin
    - docker build -t ${PERSIST_IMAGE_NAME}:${PERSIST_IMAGE_TAG} -t ${PERSIST_IMAGE_NAME}:latest .
    - docker push ${PERSIST_IMAGE_NAME}:${PERSIST_IMAGE_TAG}
    - docker push ${PERSIST_IMAGE_NAME}:latest

persist-update-infra:
  stage: update-infra
  image: alpine:3.20
  before_script:
    - apk add --no-cache git yq
  script:
    - git config --global user.name "gitlab-ci"
    - git config --global user.email "gitlab-ci@cluster.lab"
    - git config --global http.sslVerify false
    - git clone --branch ${PERSIST_INFRA_BRANCH} https://oauth2:${INFRA_REPO_TOKEN}@gitlab.cluster.lab/harald/industrial-data-platform-infra.git
    - cd industrial-data-platform-infra
    - export PERSIST_IMAGE_TAG="${CI_COMMIT_SHORT_SHA}"
    - echo "PERSIST_INFRA_APP_PATH=${PERSIST_INFRA_APP_PATH}"
    - echo "PERSIST_IMAGE_TAG=${PERSIST_IMAGE_TAG}"
    - echo "----- BEFORE -----"
    - cat ${PERSIST_INFRA_APP_PATH}/kustomization.yaml
    - yq -i '(.images[] | select(.name == "harbor.cluster.lab/industrial/plc-persist-service").newTag) = strenv(PERSIST_IMAGE_TAG)' ${PERSIST_INFRA_APP_PATH}/kustomization.yaml
    - echo "----- AFTER ------"
    - cat ${PERSIST_INFRA_APP_PATH}/kustomization.yaml
    - git add ${PERSIST_INFRA_APP_PATH}/kustomization.yaml
    - |
      if git diff --cached --quiet; then
        echo "No infra changes detected"
      else
        git commit -m "plc-persist-service -> ${PERSIST_IMAGE_TAG}"
        git push origin ${PERSIST_INFRA_BRANCH}
      fi
  dependencies: []
