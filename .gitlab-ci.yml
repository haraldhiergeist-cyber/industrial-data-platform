stages:
  - trigger
  - test
  - build
  - docker
  - update-infra

ui-pipeline:
  stage: trigger
  trigger:
    include:
      - local: 'plc-industrial-ui/.gitlab-ci.yml'
    strategy: depend
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      changes:
        - plc-industrial-ui/**

query-pipeline:
  stage: trigger
  trigger:
    include:
      - local: 'plc-query-service/.gitlab-ci.yml'
    strategy: depend
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      changes:
        - plc-query-service/**
        - industrial-data-platform-contracts/**
        - pom.xml