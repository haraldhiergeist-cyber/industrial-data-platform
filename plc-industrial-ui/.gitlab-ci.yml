stages:
  - test
  - build
  - image
  - update-infra

variables:
  IMAGE_NAME: harbor.cluster.lab/industrial/plc-industrial-ui
  IMAGE_TAG: $CI_COMMIT_SHORT_SHA
  DOCKER_TLS_CERTDIR: ""

cache:
  key: ${CI_COMMIT_REF_SLUG}
  paths:
    - node_modules/

test:
  stage: test
  image: node:20-alpine
  script:
    - npm ci
    - npm run lint || true
    - npm run test -- --watch=false --browsers=ChromeHeadless || true

build:
  stage: build
  image: node:20-alpine
  script:
    - npm ci
    - npm run build
  artifacts:
    paths:
      - dist/
    expire_in: 1 day

image:
  stage: image
  image: docker:27
  services:
    - docker:27-dind
  script:
    - echo "$HARBOR_PASSWORD" | docker login harbor.cluster.lab -u "$HARBOR_USERNAME" --password-stdin
    - docker build -t $IMAGE_NAME:$IMAGE_TAG -t $IMAGE_NAME:latest .
    - docker push $IMAGE_NAME:$IMAGE_TAG
    - docker push $IMAGE_NAME:latest
  only:
    - main

update-infra:
  stage: update-infra
  image: alpine:3.20
  before_script:
    - apk add --no-cache git yq
    - git config --global user.email "ci@cluster.lab"
    - git config --global user.name "GitLab CI"
  script:
    - git clone https://oauth2:${INFRA_REPO_TOKEN}@gitlab.cluster.lab/root/industrial-data-platform-infra.git
    - cd industrial-data-platform-infra
    - yq -i '(.images[] | select(.name == "harbor.cluster.lab/library/plc-industrial-ui") | .newTag) = strenv(IMAGE_TAG)' plc-industrial-ui/overlays/dev/kustomization.yaml
    - git add plc-industrial-ui/overlays/dev/kustomization.yaml
    - git commit -m "Update plc-industrial-ui image tag to ${IMAGE_TAG}" || echo "No changes to commit"
    - git push
  only:
    - main