variables:
  UI_IMAGE_NAME: harbor.cluster.lab/industrial/plc-industrial-ui
  UI_IMAGE_TAG: $CI_COMMIT_SHORT_SHA

cache:
  key: ${CI_COMMIT_REF_SLUG}
  paths:
    - node_modules/

stages:
  - test
  - build
  - docker
  - update-infra

ui-test:
  stage: test
  image: node:20-alpine
  script:
    - cd plc-industrial-ui
    - npm ci
    - npm run lint || true
    - npm run test -- --watch=false --browsers=ChromeHeadless || true

ui-build:
  stage: build
  image: node:20-alpine
  script:
    - cd plc-industrial-ui
    - npm ci
    - npm run build
  artifacts:
    paths:
      - plc-industrial-ui/dist/
    expire_in: 1 day

ui-docker-build:
  stage: docker
  image: docker:27
  services:
    - name: docker:27-dind
      command: ["--dns=10.10.100.1", "--insecure-registry=harbor.cluster.lab"]
  variables:
    DOCKER_TLS_CERTDIR: ""
  script:
    - cd plc-industrial-ui
    - getent hosts harbor.cluster.lab
    - echo "$HARBOR_PASSWORD" | docker login harbor.cluster.lab -u "$HARBOR_USERNAME" --password-stdin
    - docker build -t $UI_IMAGE_NAME:$UI_IMAGE_TAG -t $UI_IMAGE_NAME:latest .
    - docker push $UI_IMAGE_NAME:$UI_IMAGE_TAG
    - docker push $UI_IMAGE_NAME:latest

ui-update-infra:
  stage: update-infra
  image: alpine:3.20
  before_script:
    - apk add --no-cache git yq
    - git config --global user.email "ci@cluster.lab"
    - git config --global user.name "GitLab CI"
    - git config --global http.sslVerify false
  script:
    - git clone https://oauth2:${INFRA_REPO_TOKEN}@gitlab.cluster.lab/harald/industrial-data-platform-infra.git
    - cd industrial-data-platform-infra
    - export UI_IMAGE_TAG="${CI_COMMIT_SHORT_SHA}"
    - yq -i '(.images[] | .name) = "harbor.cluster.lab/industrial/plc-industrial-ui"' web/plc-industrial-ui/overlays/dev/kustomization.yaml
    - yq -i '(.images[] | select(.name == "harbor.cluster.lab/industrial/plc-industrial-ui") | .newTag) = strenv(UI_IMAGE_TAG)' web/plc-industrial-ui/overlays/dev/kustomization.yaml
    - cat web/plc-industrial-ui/overlays/dev/kustomization.yaml
    - git add web/plc-industrial-ui/overlays/dev/kustomization.yaml
    - git commit -m "Update plc-industrial-ui image tag to ${UI_IMAGE_TAG} [skip ci]" || echo "No changes to commit"
    - git push