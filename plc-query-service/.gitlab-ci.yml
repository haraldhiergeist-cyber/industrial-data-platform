
variables:
  QUERY_IMAGE_NAME: harbor.cluster.lab/industrial/plc-query-service
  QUERY_IMAGE_TAG: $CI_COMMIT_SHORT_SHA
  QUERY_INFRA_BRANCH: "main"
  QUERY_INFRA_APP_PATH: "api/plc-query-service/overlays/dev"

stages:
  - build
  - docker
  - update-infra

query-build:
  stage: build
  image: maven:3.9.9-eclipse-temurin-21
  script:
    - mvn -B -DskipTests -pl ./plc-query-service -am clean package
  artifacts:
    paths:
      - plc-query-service/target/*.jar
    expire_in: 1 day

query-docker-build:
  stage: docker
  image: docker:27
  services:
    - name: docker:27-dind
      command: ["--dns=10.10.100.1", "--insecure-registry=harbor.cluster.lab"]
  variables:
    DOCKER_TLS_CERTDIR: ""
  script:
    - cd plc-query-service
    - getent hosts harbor.cluster.lab
    - echo "$HARBOR_PASSWORD" | docker login harbor.cluster.lab -u "$HARBOR_USERNAME" --password-stdin
    - docker build -t ${QUERY_IMAGE_NAME}:${QUERY_IMAGE_TAG} -t ${QUERY_IMAGE_NAME}:latest .
    - docker push ${QUERY_IMAGE_NAME}:${QUERY_IMAGE_TAG}
    - docker push ${QUERY_IMAGE_NAME}:latest

query-update-infra:
  stage: update-infra
  image: alpine:3.20
  before_script:
    - apk add --no-cache git yq
  script:
    - git config --global user.name "gitlab-ci"
    - git config --global user.email "gitlab-ci@cluster.lab"
    - git config --global http.sslVerify false
    - git clone --branch ${QUERY_INFRA_BRANCH} https://oauth2:${INFRA_REPO_TOKEN}@gitlab.cluster.lab/harald/industrial-data-platform-infra.git
    - cd industrial-data-platform-infra
    - export QUERY_IMAGE_TAG="${CI_COMMIT_SHORT_SHA}"
    - echo "QUERY_INFRA_APP_PATH=${QUERY_INFRA_APP_PATH}"
    - echo "QUERY_IMAGE_TAG=${QUERY_IMAGE_TAG}"
    - echo "----- BEFORE -----"
    - cat ${QUERY_INFRA_APP_PATH}/kustomization.yaml
    - yq -i '(.images[] | select(.name == "harbor.cluster.lab/industrial/plc-query-service").newTag) = strenv(QUERY_IMAGE_TAG)' ${QUERY_INFRA_APP_PATH}/kustomization.yaml
    - echo "----- AFTER ------"
    - cat ${QUERY_INFRA_APP_PATH}/kustomization.yaml
    - git add ${QUERY_INFRA_APP_PATH}/kustomization.yaml
    - |
      if git diff --cached --quiet; then
        echo "No infra changes detected"
      else
        git commit -m "plc-query-service -> ${QUERY_IMAGE_TAG}"
        git push origin ${QUERY_INFRA_BRANCH}
      fi
  dependencies: []
